name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Prepare Pages bundle
        env:
          API_BASE: ${{ secrets.API_BASE }}
        run: |
          mkdir -p dist
          cp luck_single.html dist/index.html
          for f in splash.png player.PNG obstacle1.PNG obstacle2.PNG item.PNG item2.PNG item3.PNG; do
            if [ -f "$f" ]; then cp "$f" dist/; fi
          done
          # Generate config.js from repository secret at build time.
          cat > dist/config.js <<JS
window.LUCK_CONFIG = {
  apiBase: "${API_BASE}"
};
JS
          touch dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
